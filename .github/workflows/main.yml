name: Java CI with Maven

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test each project
        run: |
          for dir in Bai*/ ; do
            if [ -f "$dir/pom.xml" ]; then
              echo "Building $dir..."
              mvn -B package --file "$dir/pom.xml"
            else
              echo "Skipping $dir (no pom.xml found)"
            fi
          done
