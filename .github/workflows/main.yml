name: Java Homework Pipeline

on: [push, pull_request]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Verify All Projects
        # Đoạn script này sẽ tự động tìm pom.xml trong các thư mục con và chạy
        shell: bash
        run: |
          for pom in $(find . -name "pom.xml" -not -path "*/target/*"); do
            dir=$(dirname $pom)
            echo "----------------------------------------------------"
            echo "Building project in $dir"
            echo "----------------------------------------------------"
            mvn -f "$pom" clean verify -Dcheckstyle.skip -DskipTests
          done

      - name: Archive artifacts
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: exercise-results
          path: "**/target/*.jar"
