name: Java Comprehensive CI

on: [push, pull_request]

jobs:
  build:
    strategy:
      fail-fast: false # Để 1 máy lỗi các máy khác vẫn chạy tiếp cho bạn dễ soi
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Verify
        # Dùng -DskipTests nếu bạn muốn nó xanh nhanh để kiểm tra matrix trước
        # Hoặc để nguyên để nó chạy test thực tế
        run: mvn clean verify 

      - name: Upload Artifacts
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Exercise-Reports
          path: |
            **/target/*.jar
            **/target/site/jacoco/
